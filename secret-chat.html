<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Chat - Voovle</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <header>
    <nav>
      <a href="vmail.html">Vmail</a>
      <a href="index.html">Images</a>
      <a href="#" class="apps-btn" aria-label="Voovle apps">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"/></svg>
      </a>
      <a href="login.html" class="sign-in-btn">Sign in</a>
    </nav>
  </header>

  <div id="chatApp">
    <div id="lobby" class="chat-lobby">
      <div class="lobby-card">
        <div class="lobby-icon">&#x1F50F;</div>
        <h1>Secret Chat</h1>
        <p class="lobby-subtitle">🔒 AES-256-GCM encrypted. Zero traces. Password-protected rooms.</p>

        <div class="lobby-actions">
          <div class="lobby-section">
            <h3>Create a Room</h3>
            <input type="text" id="createInviteInput" placeholder="Invite code (e.g. myroom123)" maxlength="30" autocomplete="off">
            <input type="text" id="roomNameInput" placeholder="Room display name" maxlength="30">
            <input type="text" id="nickInput" placeholder="Your nickname" maxlength="20">
            <input type="password" id="roomPassInput" placeholder="Room password (shared with invitees)" autocomplete="new-password">
            <button class="primary-btn" onclick="createRoom()">Generate Invite URL</button>
          </div>

          <div class="divider"><span>OR</span></div>

          <div class="lobby-section">
            <h3>Join a Room</h3>
            <input type="text" id="inviteCodeInput" placeholder="Paste invite code or open invite URL">
            <input type="text" id="joinNickInput" placeholder="Your nickname" maxlength="20">
            <input type="password" id="joinPassInput" placeholder="Room password (from creator)" autocomplete="new-password">
            <button class="primary-btn" onclick="joinRoom()">Join Encrypted Room</button>
          </div>
        </div>

        <p id="lobbyMsg" class="lobby-msg"></p>
      </div>
    </div>

    <div id="chatRoom" class="chat-room" style="display:none">
      <div class="chat-header">
        <div>
          <span id="chatRoomName" class="chat-room-name"></span>
          <span id="chatRoomInfo" class="chat-room-info"></span>
        </div>
        <div class="chat-header-actions">
          <label class="burn-label" title="Messages self-destruct 10s after sending">
            <input type="checkbox" id="burnToggle"> 🔥 Burn
          </label>
          <button class="invite-btn" onclick="copyInvite()">&#x1F4E9; Copy Invite Code</button>
          <button class="leave-btn" onclick="leaveRoom()">&#x1F4A5; Leave & Destroy</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
        <button class="send-chat-btn" onclick="sendMessage()">Send &#x1F512;</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="js/scripts.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
